  * { box-sizing: border-box; }
  .app { display: flex; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: inherit; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
  .boot { min-height: 100vh; display: grid; place-content: center; gap: 12px; justify-items: center;
    background: #0C0E13; color: #8A94A6; }
  .boot-logo { width: 48px; height: 48px; border-radius: 12px; background: #2F6BFF; color: #fff;
    display: grid; place-items: center; font-weight: 800; font-size: 24px; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Sidebar */
  .sidebar { width: 236px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 18px 14px;
    display: flex; flex-direction: column; gap: 6px; position: sticky; top: 0; height: 100vh; background: var(--bg); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; padding: 6px 8px 14px; }
  .brand-logo { width: 30px; height: 30px; border-radius: 9px; background: var(--accent); color: #fff;
    display: grid; place-items: center; font-weight: 800; }
  .search-trigger { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 11px; margin-bottom: 8px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; font-size: 13px; transition: .15s; }
  .search-trigger:hover { border-color: var(--accent); }
  .search-trigger kbd { margin-left: auto; font-size: 11px; background: var(--surface-2); padding: 2px 6px; border-radius: 5px; }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: 9px;
    border: none; background: none; color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 500;
    width: 100%; text-align: left; transition: .12s; position: relative; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-on { background: var(--surface-2); color: var(--text); font-weight: 600; }
  .nav-on::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:2px; background: var(--accent); }
  .badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 1px 7px; border-radius: 20px; }
  .side-foot { margin-top: auto; }
  .mode-toggle { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 11px; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 13px; }
  .mode-toggle:hover { color: var(--text); }

  /* Main */
  .main { flex: 1; min-width: 0; }
  .main-focus { display: grid; place-items: start center; }
  .content { max-width: 1080px; margin: 0 auto; padding: 34px 34px 80px; }
  .main-focus .content { max-width: 720px; }
  .focus-exit { position: fixed; top: 18px; right: 18px; z-index: 20; display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 13px; }

  /* Layout helpers */
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .stack-lg { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; align-items: center; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .wrap { flex-wrap: wrap; gap: 12px; }
  .grow { flex: 1; min-width: 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .grid-2-g { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .h1 { font-size: 25px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .muted { color: var(--muted); }
  .small { font-size: 12.5px; }
  .mono { font-variant-numeric: tabular-nums; font-family: 'SF Mono', ui-monospace, monospace; }
  code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

  /* Surface / cards */
  .surf { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
  .pad { padding: 20px; }
  .clickable { cursor: pointer; transition: .15s; }
  .clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--accent); }

  .pill { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 15px;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: .15s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.08); }
  .btn-ghost { background: var(--surface); border-color: var(--border); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-2); }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 8px; display: grid; place-items: center; }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }

  /* Inputs */
  .inp { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: .15s; }
  .inp:focus { border-color: var(--accent); }
  .inp-sm { padding: 7px 10px; font-size: 13px; width: auto; }
  textarea.inp { resize: vertical; line-height: 1.5; }
  .chip { padding: 7px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .chip:hover { border-color: var(--accent); }
  .chip-on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip-wide { width: 100%; justify-content: flex-start; }
  .emoji { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); font-size: 18px; cursor: pointer; }
  .swatch { width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer; }

  /* Bars & rings */
  .bar { height: 8px; background: var(--surface-2); border-radius: 20px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 20px; transition: width .6s cubic-bezier(.2,.8,.2,1); }

  /* KPI */
  .kpi { display: flex; flex-direction: column; gap: 4px; }
  .kpi-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--surface-2); display: grid; place-items: center; color: var(--accent); }
  .kpi-val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-top: 8px; }
  .stat-mini { display: flex; align-items: center; gap: 7px; padding: 8px 13px; font-size: 13px; }
  .stat-mini b { font-size: 15px; }

  .plan-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .plan-row:last-child { border-bottom: none; }

  /* Subjects */
  .subject-card { transition: .15s; }
  .subject-card:hover { box-shadow: var(--shadow); }
  .subj-icon { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; font-size: 22px; }

  /* Study */
  .study-wrap { max-width: 640px; margin: 0 auto; }
  .flash-card { border-top: 3px solid var(--accent); animation: slideUp .3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .flash-front { font-size: 21px; font-weight: 600; line-height: 1.4; margin-top: 4px; }
  .reveal { animation: slideUp .25s ease; }
  .typed-box, .flash-back { background: var(--surface-2); border-radius: 12px; padding: 14px; margin-top: 14px; }
  .flash-back { font-size: 18px; }
  .flash-back div, .typed-box div { margin-top: 4px; }
  .grade-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 18px; }
  .grade-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 12px 4px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--gc); position: relative; transition: .12s; }
  .grade-btn:hover { border-color: var(--gc); background: color-mix(in srgb, var(--gc) 8%, transparent); }
  .grade-btn kbd { position: absolute; top: 5px; right: 6px; font-size: 10px; color: var(--muted); }
  .grade-btn .muted { color: var(--muted); }

  /* Exam */
  .sim-card { text-align: center; }
  .sim-num { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
  .q-stem { font-size: 19px; font-weight: 600; line-height: 1.45; margin-top: 6px; }
  .opt { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); cursor: pointer; text-align: left; font-size: 15px; color: var(--text); transition: .12s; }
  .opt:hover { border-color: var(--accent); }
  .opt-on { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .opt-key { width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; background: var(--surface-2); display: grid; place-items: center; font-weight: 700; font-size: 13px; }
  .opt-on .opt-key { background: var(--accent); color: #fff; }
  .result-hero { display: flex; align-items: center; gap: 26px; flex-wrap: wrap; }
  .answer-review { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .answer-review:last-child { border-bottom: none; }
  .expl { margin-top: 6px; font-size: 13px; color: var(--muted); background: var(--surface-2); padding: 8px 11px; border-radius: 9px; }

  .prev-item { padding: 8px 11px; background: var(--surface-2); border-radius: 9px; font-size: 13px; }

  /* Import tabs */
  .import-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .import-tab { display: flex; align-items: center; gap: 13px; padding: 16px 18px; border-radius: 14px;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; text-align: left; transition: .15s; }
  .import-tab:hover { border-color: var(--text); }
  .import-tab b { color: var(--text); font-size: 15px; }
  .import-tab-on { border-color: var(--tc); color: var(--tc);
    background: color-mix(in srgb, var(--tc) 7%, transparent); }
  .import-tab-on b { color: var(--tc); }

  /* Calendar / events */
  .event-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .event-row:last-child { border-bottom: none; }
  .event-row.done b { text-decoration: line-through; color: var(--muted); }

  /* Pomodoro */
  .pomodoro { text-align: center; padding: 34px; }

  /* Achievements */
  .achievement { text-align: center; transition: .15s; }
  .ach-emoji { font-size: 38px; margin-bottom: 8px; }

  /* Notes */
  .notes-layout { display: flex; gap: 16px; align-items: flex-start; }
  .notes-list { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
  .note-item { text-align: left; padding: 9px 11px; border-radius: 9px; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 13.5px; }
  .note-item:hover { background: var(--surface-2); color: var(--text); }
  .note-on { background: var(--surface-2); color: var(--text); font-weight: 600; }
  .notes-editor { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .md-preview { padding: 14px; background: var(--surface-2); border-radius: 12px; overflow: auto; line-height: 1.6; font-size: 14px; }
  .md-preview h1 { font-size: 20px; } .md-preview h2 { font-size: 17px; } .md-preview mark { background: var(--accent); color: #fff; padding: 0 3px; border-radius: 3px; }

  /* Settings */
  .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .empty-emoji { font-size: 54px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 20px; animation: fade .15s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); animation: slideUp .2s; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .modal-body { padding: 18px; max-height: 72vh; overflow: auto; }

  /* Command palette */
  .cmd { width: 100%; max-width: 560px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; animation: slideUp .18s; }
  .cmd-input { display: flex; align-items: center; gap: 10px; padding: 15px 18px; border-bottom: 1px solid var(--border); }
  .cmd-input input { flex: 1; border: none; background: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; }
  .cmd-results { max-height: 340px; overflow: auto; padding: 6px; }
  .cmd-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; border-radius: 10px; border: none; background: none; color: var(--text); cursor: pointer; font-size: 14px; }
  .cmd-item:hover { background: var(--surface-2); }
  .cmd-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Responsive */
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .notes-editor { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .sidebar { position: fixed; bottom: 0; top: auto; left: 0; right: 0; width: 100%; height: auto;
      flex-direction: row; border-right: none; border-top: 1px solid var(--border); padding: 8px; z-index: 40; overflow-x: auto; }
    .brand, .search-trigger, .side-foot { display: none; }
    .nav { flex-direction: row; gap: 2px; }
    .nav-item span { display: none; }
    .nav-item { padding: 10px; }
    .nav-on::before { display: none; }
    .content { padding: 20px 16px 90px; }
    .grid-2, .grid-4, .grid-3, .grid-2-g { grid-template-columns: 1fr; }
