  * { box-sizing: border-box; }
  .app { display: flex; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: inherit; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
  .boot { min-height: 100vh; display: grid; place-content: center; gap: 12px; justify-items: center;
    background: #0C0E13; color: #8A94A6; }
  .boot-logo { width: 48px; height: 48px; border-radius: 12px; background: #2F6BFF; color: #fff;
    display: grid; place-items: center; font-weight: 800; font-size: 24px; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Sidebar */
  .sidebar { width: 236px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 18px 14px;
    display: flex; flex-direction: column; gap: 6px; position: sticky; top: 0; height: 100vh; background: var(--bg); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; padding: 6px 8px 14px; }
  .brand-logo { width: 30px; height: 30px; border-radius: 9px; background: var(--accent); color: #fff;
    display: grid; place-items: center; font-weight: 800; }
  .search-trigger { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 11px; margin-bottom: 8px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; font-size: 13px; transition: .15s; }
  .search-trigger:hover { border-color: var(--accent); }
  .search-trigger kbd { margin-left: auto; font-size: 11px; background: var(--surface-2); padding: 2px 6px; border-radius: 5px; }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: 9px;
    border: none; background: none; color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 500;
    width: 100%; text-align: left; transition: .12s; position: relative; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-on { background: var(--surface-2); color: var(--text); font-weight: 600; }
  .nav-on::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:2px; background: var(--accent); }
  .badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 1px 7px; border-radius: 20px; }
  .side-foot { margin-top: auto; }
  .mode-toggle { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 11px; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 13px; }
  .mode-toggle:hover { color: var(--text); }

  /* Main */
  .main { flex: 1; min-width: 0; }
  .main-focus { display: grid; place-items: start center; }
  .content { max-width: 1080px; margin: 0 auto; padding: 34px 34px 80px; }
  .main-focus .content { max-width: 720px; }
  .focus-exit { position: fixed; top: 18px; right: 18px; z-index: 20; display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 13px; }

  /* Layout helpers */
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .stack-lg { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; align-items: center; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .wrap { flex-wrap: wrap; gap: 12px; }
  .grow { flex: 1; min-width: 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .grid-2-g { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .h1 { font-size: 25px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .muted { color: var(--muted); }
  .small { font-size: 12.5px; }
  .mono { font-variant-numeric: tabular-nums; font-family: 'SF Mono', ui-monospace, monospace; }
  code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

  /* Surface / cards */
  .surf { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
  .pad { padding: 20px; }
  .clickable { cursor: pointer; transition: .15s; }
  .clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--accent); }

  .pill { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 9px 15px;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: .15s; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }

  .btn-ghost { background: var(--surface); border-color: var(--border); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface-2); }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 8px; display: grid; place-items: center; }

  .inp { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);

  .inp:focus { border-color: var(--accent); }
  .inp-sm { padding: 7px 10px; font-size: 13px; width: auto; }
  textarea.inp { resize: vertical; line-height: 1.5; }
  .chip { padding: 7px 12px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .chip:hover { border-color: var(--accent); }
  .chip-on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip-wide { width: 100%; justify-content: flex-start; }
  .emoji { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); font-size: 18px; cursor: pointer; }
  .swatch { width: 30px; height: 30px; border-radius: 8px; border: none; cursor: pointer; }

  /* Bars & rings */
  .bar { height: 8px; background: var(--surface-2); border-radius: 20px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 20px; transition: width .6s cubic-bezier(.2,.8,.2,1); }

  /* KPI */
  .kpi { display: flex; flex-direction: column; gap: 4px; }
  .kpi-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--surface-2); display: grid; place-items: center; color: var(--accent); }
  .kpi-val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-top: 8px; }
  .stat-mini { display: flex; align-items: center; gap: 7px; padding: 8px 13px; font-size: 13px; }
  .stat-mini b { font-size: 15px; }

  .plan-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .plan-row:last-child { border-bottom: none; }

  /* Subjects */
  .subject-card { transition: .15s; }
  .subject-card:hover { box-shadow: var(--shadow); }
  .subj-icon { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; font-size: 22px; }

  /* Study */
  .study-wrap { max-width: 640px; margin: 0 auto; }
  .flash-card { border-top: 3px solid var(--accent); animation: slideUp .3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .flash-front { font-size: 21px; font-weight: 600; line-height: 1.4; margin-top: 4px; }

  .typed-box, .flash-back { background: var(--surface-2); border-radius: 12px; padding: 14px; margin-top: 14px; }
  .flash-back { font-size: 18px; }
  .flash-back div, .typed-box div { margin-top: 4px; }

  .ach-emoji { font-size: 38px; margin-bottom: 8px; }

  .empty-emoji { font-size: 54px; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 20px; animation: fade .15s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .modal-body { padding: 18px; max-height: 72vh; overflow: auto; }
